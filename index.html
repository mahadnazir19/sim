<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Car - Full Manual Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 5px #000; z-index: 10; pointer-events: none; }
        
        /* Mobile Controls */
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 20; }
        .steering { display: flex; gap: 20px; }
        .pedals { display: flex; gap: 20px; }
        
        .btn { width: 75px; height: 75px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; user-select: none; -webkit-tap-highlight-color: transparent; font-size: 14px; }
        .gas { background: rgba(0, 255, 0, 0.3); width: 90px; height: 90px; border-radius: 15px; } /* Throttle Button */
        .brake { background: rgba(255, 0, 0, 0.3); width: 80px; height: 80px; border-radius: 15px; }
        
        .btn:active { transform: scale(0.9); background: rgba(255,255,255,0.4); }
        
        @media (min-width: 800px) { .controls { display: none; } }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="score">Score: 0</h2>
        <div id="speedo">Speed: 0 mph</div>
    </div>

    <div class="controls">
        <div class="steering">
            <div class="btn" id="left">LEFT</div>
            <div class="btn" id="right">RIGHT</div>
        </div>
        <div class="pedals">
            <div class="btn brake" id="brake">BRAKE</div>
            <div class="btn gas" id="gas">GAS</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, car, road;
        let score = 0, speed = 0, maxSpeed = 1.2;
        let moveLeft = false, moveRight = false, isBraking = false, isGas = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 15, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Road
            const roadGeo = new THREE.PlaneGeometry(15, 2000);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // Car
            car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.7, 4), new THREE.MeshPhongMaterial({ color: 0xe74c3c }));
            body.position.y = 0.5;
            car.add(body);
            const roof = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.5, 1.6), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            roof.position.set(0, 1.1, -0.2);
            car.add(roof);
            scene.add(car);

            setupControls();
            animate();
        }

        function setupControls() {
            const btns = {
                'left': (val) => moveLeft = val,
                'right': (val) => moveRight = val,
                'brake': (val) => isBraking = val,
                'gas': (val) => isGas = val
            };

            // Touch events for all buttons
            Object.keys(btns).forEach(id => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); btns[id](true); });
                el.addEventListener('touchend', (e) => { e.preventDefault(); btns[id](false); });
            });

            // Keyboard events
            document.addEventListener('keydown', (e) => {
                if(e.key === "ArrowLeft") moveLeft = true;
                if(e.key === "ArrowRight") moveRight = true;
                if(e.key === "ArrowUp") isGas = true;
                if(e.key === "ArrowDown") isBraking = true;
            });
            document.addEventListener('keyup', (e) => {
                if(e.key === "ArrowLeft") moveLeft = false;
                if(e.key === "ArrowRight") moveRight = false;
                if(e.key === "ArrowUp") isGas = false;
                if(e.key === "ArrowDown") isBraking = false;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Throttle & Brake Physics
            if (isGas && !isBraking) {
                speed = THREE.MathUtils.lerp(speed, maxSpeed, 0.02); // Acceleration
            } else if (isBraking) {
                speed = THREE.MathUtils.lerp(speed, 0, 0.1); // Strong Braking
            } else {
                speed = THREE.MathUtils.lerp(speed, 0, 0.01); // Natural Friction (Slow down)
            }

            // Steering (Sirf chalte waqt steer karegi)
            let steerSpeed = speed * 0.2;
            if (moveLeft && car.position.x > -6) car.position.x -= steerSpeed;
            if (moveRight && car.position.x < 6) car.position.x += steerSpeed;

            // Environment Movement
            road.position.z += speed;
            if (road.position.z > 100) road.position.z = 0;

            // UI Updates
            if(speed > 0.01) score += speed;
            document.getElementById('score').innerText = "Score: " + Math.floor(score/10);
            document.getElementById('speedo').innerText = "Speed: " + Math.floor(speed * 100) + " mph";

            // Camera follow
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, car.position.x * 0.5, 0.05);
            camera.lookAt(car.position.x, 1, car.position.z - 5);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
